<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Evolución de Software - UPN</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f4f9;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px;
        }

        .main-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .sidebar {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .version-tag {
            background: #ce1126;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        #log {
            font-size: 0.9em;
            color: #ecf0f1;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>Métricas de Colaboración <span class="version-tag" id="v-label">v1.0.0</span></h1>
        <canvas id="myChart" width="400" height="200"></canvas>
    </div>
    <div class="sidebar">
        <h3>Log de Actividad</h3>
        <ul id="log"><li>Proyecto inicializado por Docente</li></ul>
    </div>
    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const nombres = ['Inicio'];
        const commits = [0];
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: 'Número de Commits por Alumno',
                    data: commits,
                    backgroundColor: 'rgba(206, 17, 38, 0.5)',
                    borderColor: 'rgba(206, 17, 38, 1)',
                    borderWidth: 1
                }]
            }
        });
    </script>
</body>
</html>
